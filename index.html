<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万民堂</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <h1>自助餐</h1>
        <div class="input-group">
            <input type="text" v-model="newUid" placeholder="自动做饭中...">
            <button @click="addUid">添加</button>
        </div>
        <div class="uid-list">
            <p>当前饭数：{{ uidList.length }} / 3 已做: {{ uidCount }}</p>
            <transition-group name="list" tag="ul" v-if="uidList.length">
                <li class="list-item" v-for="(uid, index) in uidList" :key="uid.uid" @click="copyUid(index)">
                    <label>{{ uid.uid }}</label>
                    <span>{{ formatTimeDiff(nowSeconds - uidList[index].time) }}</span>
                    <button @click.stop="removeUid(index)">拿走</button>
                </li>
            </transition-group>
            <p v-else>饭吃完了，新饭马上端上来</p>
        </div>
        <div class="tip">
            <p>提示：吃一碗拿一碗，不要浪费。当饭不满3碗时，系统会自动补充。</p>
        </div>
        <div class="uid-list">
            <h2>历史记录</h2>
            <ul>
                <li class="history-item" v-for="(item, index) in uidHistory" :key="index" @click="copyText(item.uid)">
                    <label>{{ item.uid }}</label>
                    <span>{{ formatTimeDiff(nowSeconds - item.time) }}</span>
                </li>
            </ul>
        </div>
    </div>
</body>

</html>
<script>
    const { createApp, ref } = Vue

    const baseURL = '/'//location.hostname === 'pa001024.pythonanywhere.com' ? '/' : 'https://pa001024.pythonanywhere.com/'
    createApp({
        setup() {
            const nowSeconds = ref(0)
            const uidList = ref([])
            const uidHistory = ref([])
            const newUid = ref("")
            const cookerCount = ref(0)
            const uidCount = ref(0)
            const updateUidList = async () => {
                const response = await fetch(baseURL + 'uid')
                const data = await response.json()
                console.log(data)
                uidList.value = data.current
                uidHistory.value = data.history
                uidCount.value = data.count
                cookerCount.value = data.cookers
            }
            updateUidList()
            setInterval(updateUidList, 10000)

            const formatTimeDiff = (time) => {
                const minute = ~~(time / 60)
                const second = time % 60
                return minute > 15 ? `很久之前` : `${minute}分${second}秒前`
            }
            const updateTime = () => {
                nowSeconds.value = ~~(Date.now() / 1000)
            }
            updateTime()
            setInterval(updateTime, 1000)

            const copyText = async (text) => {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text)
                    return
                }
                const input = document.createElement('textarea')
                input.value = text
                document.body.appendChild(input)
                input.focus()
                input.select()
                const result = document.execCommand('copy')
                input.remove()
                if (!result)
                    throw new Error('复制失败')
            }
            const removeUid = async (index) => {
                try {
                    await copyUid(index)
                } catch (e) {
                    if (!confirm('复制失败，确认要删除吗？'))
                        return
                }
                const uid = uidList.value.splice(index, 1)
                fetch(baseURL + 'del/' + uid[0].uid)
            }
            const copyUid = async (index) => {
                const uid = uidList.value[index]
                await copyText(uid.uid)
            }

            const addUid = async () => {
                if (newUid.value) {
                    uidList.value.push({ uid: newUid.value, time: nowSeconds.value })
                    uidCount.value += 1
                    await fetch(baseURL + 'add/' + newUid.value)
                    newUid.value = ''
                }
            }
            return {
                nowSeconds, uidList, uidHistory, newUid, cookerCount, uidCount, removeUid, copyUid, addUid, newUid, formatTimeDiff
            }
        }
    }).mount('#app')
</script>
