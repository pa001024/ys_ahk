<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UID</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <h1>自助餐</h1>
        <div class="input-group">
            <input type="text" v-model="newUid" placeholder="自动做饭中...">
            <button @click="addUid">添加</button>
        </div>
        <div class="uid-list">
            <p>当前饭数：{{ uidList.length }} / 3</p>
            <ul v-if="uidList.length">
                <li v-for="(uid, index) in uidList" :key="index" @click="copyUid(index)">
                    <label>{{ uid }}</label>
                    <button @click.stop="removeUid(index)">拿走</button>
                </li>
            </ul>
            <p v-else>饭吃完了，新饭马上端上来</p>
        </div>
        <div class="tip">
            <p>提示：吃一碗拿一碗，不要浪费。当饭不满3碗时，系统会自动补充。</p>
        </div>
    </div>
</body>

</html>
<script>
    const { createApp, ref } = Vue

    const baseURL = location.hostname === 'pa001024.pythonanywhere.com' ? '/' : 'https://pa001024.pythonanywhere.com/'
    createApp({
        setup() {
            const uidList = ref([])
            const newUid = ref("")
            const updateUidList = async () => {
                const response = await fetch(baseURL + 'list')
                const data = await response.text()
                uidList.value = data ? data.split(',') : []
                console.log(uidList.value)
            }
            updateUidList()
            setInterval(updateUidList, 10000)

            const copyText = async (text) => {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text)
                    return
                }
                const input = document.createElement('textarea')
                input.value = text
                document.body.appendChild(input)
                input.focus()
                input.select()
                const result = document.execCommand('copy')
                input.remove()
                if (!result)
                    throw new Error('复制失败')
            }
            const removeUid = async (index) => {
                try {
                    await copyUid(index)
                } catch (e) {
                    if (!confirm('复制失败，确认要删除吗？'))
                        return
                }
                const uid = uidList.value.splice(index, 1)
                fetch(baseURL + 'del/' + uid)
            }
            const copyUid = async (index) => {
                const uid = uidList.value[index]
                await copyText(uid)
            }

            const addUid = async () => {
                if (newUid.value) {
                    uidList.value.push(newUid.value)
                    await fetch(baseURL + 'add/' + newUid.value)
                    newUid.value = ''
                }
            }
            return {
                uidList, removeUid, copyUid, addUid, newUid
            }
        }
    }).mount('#app')
</script>
